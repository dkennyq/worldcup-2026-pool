version: '3.8'

services:
  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    ports:
      - "8080:80"
    container_name: worldcup-2026-web
    restart: unless-stopped
    # If you need to pass environment variables at runtime (for dynamic config):
    # env_file:
    #   - ./web/.env

  # Optional: Firebase Functions local emulator
